<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:'Poppins', sans-serif;
    color:white;
    overflow:hidden;
}

/* CARD */
.card {
    width:90%;
    max-width:350px;
    height:450px;
    padding:20px;
    border-radius:25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
}

/* TITLE */
h1 {
    margin-bottom:10px;
}

/* SCROLL TEXT */
#text {
    margin-top:10px;
    font-size:16px;
    line-height:1.6;
    overflow-y:auto;
    flex:1;
    padding-right:5px;
    white-space: pre-line;
}

/* SCROLLBAR */
#text::-webkit-scrollbar {
    width:5px;
}
#text::-webkit-scrollbar-thumb {
    background:white;
    border-radius:10px;
}

/* HEARTS */
.heart {
    position:absolute;
    font-size:20px;
    animation: float 6s linear infinite;
    opacity:0.8;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity:0; }
    50% { opacity:1; }
    100% { transform: translateY(-10vh); opacity:0; }
}

/* 🎀 MUSIC BUTTON */
.music-player {
    margin-top:10px;
    display:flex;
    justify-content:center;
}

.music-player button {
    background:#ffd6e0;
    color:#b3003c;
    border:none;
    padding:10px 18px;
    border-radius:25px;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.music-player button:hover {
    background:#ffc2d1;
}
</style>
</head>

<body>

<div class="card">
    <h1>Hey… ❤️</h1>
    <div id="text"></div>

    <!-- 🎵 MUSIC BUTTON -->
    <div class="music-player">
        <button onclick="toggleMusic()" id="musicBtn">🎵 Play</button>
    </div>
</div>

<!-- HEARTS -->
<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%">💖</div>
<div class="heart" style="left:50%">💕</div>
<div class="heart" style="left:70%">💘</div>
<div class="heart" style="left:90%">❤️</div>

<!-- 🎵 AUDIO -->
<audio id="bgMusic" loop>
    <source src="love.mp3">
</audio>

<script>
let msg = "Some people come into life loudly...\n\nBut you came quietly.\n\nNo noise, no force… just a calm presence that slowly became my favorite place.\n\nWith you, nothing feels heavy.\nEven silence feels comfortable.\n\nYou take care of me in ways I don’t even notice at first…\nAnd then later I realize — someone was thinking about me this whole time.\n\nThe way you feed me, the way you look after me… 🥺\nIt’s not just love, it’s something softer, something rare.\n\nYou don’t hurt, you don’t shout,\nyou don’t make things difficult…\nYou just stay — gently, patiently.\n\nAnd in this world where everything feels temporary…\nYou feel like something I can trust.\n\nI don’t know how to explain it perfectly,\nbut being with you feels… right.\n\nNot exciting in a loud way,\nbut peaceful in the deepest way.\n\nAnd maybe that’s why…\nI didn’t just fall for you.\n\nI chose you.\nEvery day.\n❤️";

let i = 0;

function type(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 35);
    }
}
type();

/* 🎵 RESUME MUSIC */
window.onload = function () {
    let music = document.getElementById("bgMusic");

    if(localStorage.getItem("music") === "on"){
        let time = localStorage.getItem("musicTime");

        if(time){
            music.currentTime = time;
        }

        music.play().catch(()=>{});
        document.getElementById("musicBtn").innerHTML = "⏸ Pause";
    }
};

/* 🎵 SAVE TIME */
setInterval(()=>{
    let music = document.getElementById("bgMusic");
    if(!music.paused){
        localStorage.setItem("musicTime", music.currentTime);
    }
},1000);

/* 🎵 BUTTON CONTROL */
function toggleMusic(){
    let music = document.getElementById("bgMusic");
    let btn = document.getElementById("musicBtn");

    if(music.paused){
        music.play();
        btn.innerHTML = "⏸ Pause";
        localStorage.setItem("music","on");
    } else {
        music.pause();
        btn.innerHTML = "🎵 Play";
    }
}
</script>

</body>
</html>
