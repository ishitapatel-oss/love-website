<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win My Heart ❤️</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Poppins;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    overflow:hidden;
}

/* 💜 BOX */
.container {
    width:90%;
    max-width:350px;
    height:450px;
    background: rgba(200, 162, 255, 0.2);
    backdrop-filter: blur(15px);
    border-radius:25px;
    text-align:center;
    position:relative;
    padding-top:20px;
}

.game-area {
    position:relative;
    width:100%;
    height:300px;
}

/* BAT */
#bat {
    position:absolute;
    bottom:10%;
    left:10%;
    font-size:60px;
    cursor:pointer;
}

/* BALL */
#ball {
    position:absolute;
    bottom:15%;
    left:25%;
    font-size:28px;
}

/* BOY */
#boy {
    position:absolute;
    bottom:15%;
    right:10%;
    font-size:60px;
}

/* BALL CURVE */
@keyframes sixer {
    0% { left:25%; bottom:15%; }
    40% { left:50%; bottom:80%; }
    70% { left:65%; bottom:60%; }
    100% { left:70%; bottom:25%; }
}

/* DIVE RUN */
@keyframes diveRun {
    0%   { right:10%; bottom:15%; }
    40%  { right:20%; bottom:25%; }
    80%  { right:30%; bottom:35%; }
    100% { right:32%; bottom:25%; transform: rotate(-40deg); }
}

/* 💘 HEART EXPLOSION */
.heart-explode {
    position:absolute;
    font-size:20px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(0); opacity:1; }
    100% { transform: translateY(-100px) scale(2); opacity:0; }
}

/* POPUP */
.popup {
    display:none;
    position:absolute;
    top:30%;
    left:50%;
    transform:translateX(-50%);
    background: linear-gradient(135deg,#ff4d6d,#ff1e4d);
    padding:20px;
    border-radius:20px;
    z-index:999;
    width:80%;
}

/* 💜 FLOAT HEARTS */
.heart-bg {
    position:absolute;
    bottom:-50px;
    font-size:20px;
    color:#c084fc;
    animation: rise 8s infinite ease-in;
    text-shadow: 0 0 10px #c084fc;
}

@keyframes rise {
    0% { transform: translateY(0); opacity:0.5; }
    100% { transform: translateY(-110vh); opacity:0; }
}
</style>
</head>

<body>

<!-- 💜 BACKGROUND HEARTS -->
<div class="heart-bg" style="left:10%">💜</div>
<div class="heart-bg" style="left:25%; animation-delay:2s;">💖</div>
<div class="heart-bg" style="left:40%; animation-delay:4s;">💕</div>
<div class="heart-bg" style="left:60%; animation-delay:1s;">💘</div>
<div class="heart-bg" style="left:75%; animation-delay:3s;">❤️</div>

<!-- 💜 BOX -->
<div class="container">

<h2>🏏 Hit a Six & Win My Heart 💖</h2>

<div class="game-area">
    <div id="bat" onclick="hit()">🏏</div>
    <div id="ball">⚾</div>
    <div id="boy">🧍‍♂️</div>
</div>

<div class="popup" id="win">
    <h3>💖 You Won My Heart ❤️</h3>
    <p>
    You tried to hit a six 😄 <br>
    But you got caught 💕 <br>
    Just like you caught my heart 💘 <br>
    And I never want it back ❤️
    </p>
    <button onclick="next()">Final 💖</button>
</div>

</div>

<!-- 🔊 SOUND -->
<audio id="crowd">
    <source src="https://www.soundjay.com/human/crowd-cheer-01.mp3">
</audio>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="love.mp3">
</audio>
<script>
function hit(){
    let ball = document.getElementById("ball");
    let boy = document.getElementById("boy");

    // ball
    ball.style.animation = "sixer 1.6s forwards";

    // dive run
    setTimeout(()=>{
        boy.style.animation = "diveRun 1.2s forwards";
    },300);

    // catch + sound + hearts
    setTimeout(()=>{
        boy.innerHTML = "🤾‍♂️";
        document.getElementById("crowd").play();

        // 💘 heart explosion
        for(let i=0;i<6;i++){
            let heart = document.createElement("div");
            heart.innerHTML = "💖";
            heart.className = "heart-explode";
            heart.style.left = "65%";
            heart.style.top = "40%";
            document.body.appendChild(heart);

            setTimeout(()=>heart.remove(),1000);
        }
    },1400);

    // popup
    setTimeout(()=>{
        document.getElementById("win").style.display="block";
    },2000);
}

function next(){
    window.location="final.html";
}

// 🎵 MUSIC
window.onload = function () {
    let music = document.getElementById("bgMusic");

    if(localStorage.getItem("music") === "on"){
        let time = localStorage.getItem("musicTime");

        if(time){
            music.currentTime = time;
        }

        music.play().catch(()=>{});
    }
};

setInterval(()=>{
    let music = document.getElementById("bgMusic");
    if(!music.paused){
        localStorage.setItem("musicTime", music.currentTime);
    }
},1000);
</script>

</body>
</html>
