<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Secret 💖</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Poppins;
    color:white;
    overflow:hidden;
}

/* CARD */
.card {
    width:90%;
    max-width:350px;
    padding:25px;
    border-radius:25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    text-align:center;
    transition:0.3s;
}

/* SHAKE */
.shake {
    animation: shake 0.4s;
}
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* HEARTS */
.hearts span {
    font-size:30px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

.hearts span.active {
    transform: scale(1.5);
    filter: drop-shadow(0 0 10px white);
}

/* INPUT */
input {
    width:80%;
    padding:10px;
    border-radius:15px;
    border:none;
    display:none;
}

/* BUTTON */
button {
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
    display:none;
}

/* 💜 BACKGROUND HEARTS */
.heart-bg {
    position:absolute;
    bottom:-50px;
    font-size:20px;
    color:#c084fc;
    animation: rise 8s infinite ease-in;
    text-shadow: 0 0 10px #c084fc;
}

@keyframes rise {
    0% { transform: translateY(0); opacity:0.5; }
    100% { transform: translateY(-110vh); opacity:0; }
}

/* 🎵 MUSIC BUTTON */
.music-box {
    margin-top:10px;
}

.music-box button {
    background:#ffd6e0;
    color:#b3003c;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- 💜 FLOATING HEARTS -->
<div class="heart-bg" style="left:10%">❤️</div>
<div class="heart-bg" style="left:25%; animation-delay:2s;">💜</div>
<div class="heart-bg" style="left:40%; animation-delay:4s;">💖</div>
<div class="heart-bg" style="left:60%; animation-delay:1s;">💕</div>
<div class="heart-bg" style="left:75%; animation-delay:3s;">💘</div>

<div class="card" id="card">
    <h2>💖 Unlock My Heart</h2>
    <p>Tap in correct order 😏</p>

    <div class="hearts">
        <span onclick="tap(1)">❤️</span>
        <span onclick="tap(2)">💖</span>
        <span onclick="tap(3)">💕</span>
    </div>

    <p id="sequence"></p>
    <p id="status"></p>

    <input type="password" id="pass" placeholder="Enter password">
    <br>
    <button onclick="check()">Unlock ❤️</button>

    <!-- 🎵 MUSIC BUTTON -->
    <div class="music-box">
        <button onclick="toggleMusic()">🎵 Music</button>
    </div>
</div>

<!-- 🔊 CLICK SOUND -->
<audio id="clickSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="love.mp3">
</audio>

<script>
let correct = [2,1,3];
let user = [];

function tap(n){
    let hearts = document.querySelectorAll(".hearts span");
    let symbols = ["❤️","💖","💕"];

    document.getElementById("clickSound").play();

    if(navigator.vibrate){
        navigator.vibrate(50);
    }

    user.push(n);
    hearts[n-1].classList.add("active");
    document.getElementById("sequence").innerHTML += symbols[n-1] + " ";

    if(user.length === correct.length){
        setTimeout(()=>{
            if(JSON.stringify(user) === JSON.stringify(correct)){
                document.getElementById("status").innerHTML="Good 😍 unlock now";
                document.getElementById("pass").style.display="block";
                document.querySelector("button").style.display="inline-block";
            } else {
                document.getElementById("status").innerHTML="Wrong 😝 try again";

                let card = document.getElementById("card");
                card.classList.add("shake");
                setTimeout(()=>card.classList.remove("shake"),400);

                if(navigator.vibrate){
                    navigator.vibrate([200,100,200]);
                }

                user=[];
                document.getElementById("sequence").innerHTML="";
                hearts.forEach(h => h.classList.remove("active"));
            }
        },500);
    }
}

function check(){
    let p=document.getElementById("pass").value;

    if(p==="love123"){
        localStorage.setItem("music","on");
        window.location="game.html";
    } else {
        document.getElementById("status").innerHTML="Wrong password 😜";
    }
}
window.onload = function () {
    let music = document.getElementById("bgMusic");

    if(localStorage.getItem("music") === "on"){
        let time = localStorage.getItem("musicTime");

        if(time){
            music.currentTime = time;
        }

        music.play().catch(()=>{});
    }
};

/* 🎵 MUSIC FIX */
document.body.addEventListener("click", function(){
    let music = document.getElementById("bgMusic");

    if(music.paused){
        music.play().catch(()=>{});
        localStorage.setItem("music", "on");
    }
});

/* 🎵 BUTTON CONTROL */
function toggleMusic(){
    let music = document.getElementById("bgMusic");
    let btn = document.querySelector(".music-box button");

    if(music.paused){
        music.play();
        btn.innerHTML="⏸ Pause";
    } else {
        music.pause();
        btn.innerHTML="🎵 Music";
    }
}

setInterval(()=>{
    let music = document.getElementById("bgMusic");
    if(!music.paused){
        localStorage.setItem("musicTime", music.currentTime);
    }
},1000);
</script>

</body>
</html>
